<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>La Carte Ensorcelée</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
  }
  body {
    background: #1a0e00;
    color: #c8a96e;
    font-family: 'Georgia', serif;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ---- Title bar ---- */
  #titlebar {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 6px 24px;
    background: linear-gradient(180deg, #3d1f00 0%, #2a1200 100%);
    border-bottom: 2px solid #8b5e1a;
    height: 52px;
    flex-shrink: 0;
  }
  #title-text {
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 3px;
    color: #e8c97e;
    flex: 1;
  }
  #lives {
    display: flex;
    gap: 6px;
    font-size: 24px;
  }
  #wands-display {
    font-size: 18px;
    color: #c8a96e;
    background: rgba(0,0,0,0.3);
    padding: 2px 12px;
    border-radius: 4px;
    border: 1px solid #8b5e1a;
  }
  #level-display {
    font-size: 18px;
    color: #c8a96e;
    background: rgba(0,0,0,0.3);
    padding: 2px 12px;
    border-radius: 4px;
    border: 1px solid #8b5e1a;
  }

  /* ---- Main area ---- */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ---- Left panel: QR + chat ---- */
  #left-panel {
    width: 240px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: rgba(20, 10, 0, 0.8);
    border-right: 2px solid #5a3a0a;
    padding: 12px;
    gap: 10px;
  }
  #qr-block {
    text-align: center;
  }
  #qr-title {
    font-size: 13px;
    font-weight: bold;
    color: #e8c97e;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }
  #qr-img {
    width: 160px;
    height: 160px;
    border: 2px solid #8b5e1a;
    background: white;
  }
  #qr-subtitle {
    font-size: 10px;
    color: #a07040;
    margin-top: 6px;
    line-height: 1.4;
  }
  #players-count {
    font-size: 13px;
    color: #e8c97e;
    margin-top: 4px;
  }

  #chat-title {
    font-size: 13px;
    font-weight: bold;
    color: #e8c97e;
    letter-spacing: 1px;
    border-top: 1px solid #5a3a0a;
    padding-top: 8px;
  }
  #chat-list {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column-reverse;
    gap: 2px;
  }
  .chat-line {
    font-size: 12px;
    color: #b89060;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chat-line .pseudo { color: #e8c97e; }
  .chat-line .dir { color: #ff9944; }
  .chat-line.join { color: #80c080; }
  .chat-line.leave { color: #c08080; }

  /* ---- Game zone (center) ---- */
  #game-zone {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: #0d0700;
  }
  #game-canvas {
    display: block;
  }

  /* ---- Right panel: votes ---- */
  #right-panel {
    width: 200px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: rgba(20, 10, 0, 0.8);
    border-left: 2px solid #5a3a0a;
    padding: 12px;
    gap: 8px;
  }
  #vote-title {
    font-size: 13px;
    font-weight: bold;
    color: #e8c97e;
    letter-spacing: 1px;
  }
  .vote-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .vote-label { font-size: 18px; width: 24px; }
  .vote-bar-container {
    flex: 1;
    height: 16px;
    background: rgba(0,0,0,0.4);
    border: 1px solid #5a3a0a;
    border-radius: 2px;
    overflow: hidden;
  }
  .vote-bar { height: 100%; background: #8b5e1a; transition: width 0.3s; }
  .vote-count { font-size: 13px; color: #c8a96e; width: 22px; text-align: right; }
  #tours-count {
    margin-top: 8px;
    font-size: 12px;
    color: #a07040;
    border-top: 1px solid #5a3a0a;
    padding-top: 8px;
  }

  /* ---- Overlay states ---- */
  #overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(10, 5, 0, 0.85);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 24px;
    z-index: 10;
  }
  #overlay.visible { display: flex; }
  #overlay-title {
    font-size: 64px;
    font-weight: bold;
    color: #e8c97e;
    text-align: center;
    letter-spacing: 4px;
  }
  #overlay-sub {
    font-size: 24px;
    color: #c8a96e;
    text-align: center;
  }
</style>
</head>
<body>

<!-- Title bar -->
<div id="titlebar">
  <div id="title-text">La Carte Ensorcelée</div>
  <div id="lives"></div>
  <div id="wands-display" style="display:none"></div>
  <div id="level-display">Étage 1</div>
</div>

<!-- Main -->
<div id="main">
  <!-- Left: QR + chat -->
  <div id="left-panel">
    <div id="qr-block">
      <div id="qr-title">Rejoignez la quête</div>
      <img id="qr-img" src="/qr.png" alt="QR" />
      <div id="qr-subtitle">Scannez le sceau pour aider nos amis à rejoindre la salle sur demande</div>
      <div id="players-count">0 sorciers connectés</div>
    </div>
    <div id="chat-title">Le Grand Chahut</div>
    <div id="chat-list"></div>
  </div>

  <!-- Center: canvas -->
  <div id="game-zone">
    <canvas id="game-canvas"></canvas>
    <div id="overlay">
      <div id="overlay-title"></div>
      <div id="overlay-sub"></div>
    </div>
  </div>

  <!-- Right: votes -->
  <div id="right-panel">
    <div id="vote-title">Votes</div>
    <div class="vote-row">
      <span class="vote-label">↑</span>
      <div class="vote-bar-container"><div class="vote-bar" id="bar-up" style="width:0%"></div></div>
      <span class="vote-count" id="cnt-up">0</span>
    </div>
    <div class="vote-row">
      <span class="vote-label">↓</span>
      <div class="vote-bar-container"><div class="vote-bar" id="bar-down" style="width:0%"></div></div>
      <span class="vote-count" id="cnt-down">0</span>
    </div>
    <div class="vote-row">
      <span class="vote-label">←</span>
      <div class="vote-bar-container"><div class="vote-bar" id="bar-left" style="width:0%"></div></div>
      <span class="vote-count" id="cnt-left">0</span>
    </div>
    <div class="vote-row">
      <span class="vote-label">→</span>
      <div class="vote-bar-container"><div class="vote-bar" id="bar-right" style="width:0%"></div></div>
      <span class="vote-count" id="cnt-right">0</span>
    </div>
    <div id="tours-count">0 tours joués</div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

let state = null;
const CHAT_MAX = 40;
const chatLines = [];

function computeCellSize(mapW, mapH) {
  const gameZone = document.getElementById('game-zone');
  const availW = gameZone.clientWidth - 8;
  const availH = gameZone.clientHeight - 8;
  return Math.floor(Math.min(availW / mapW, availH / mapH));
}

const pursuerColors = {
  rusard: '#ff6644',
  missteigne: '#ff44aa',
  rogue: '#6644ff',
  peeves: '#44ffff',
  baronsanglant: '#cccccc',
};
const pursuerInitials = {
  rusard: 'R', missteigne: 'M', rogue: 'S', peeves: 'P', baronsanglant: 'B',
};
const dirAngles = { right: 0, down: Math.PI / 2, left: Math.PI, up: -Math.PI / 2 };

let lastCellSize = 0;

function render() {
  if (!state) return;
  const { mapCells, mapWidth, mapHeight, avatar, pursuers, wands, status } = state;

  const cell = computeCellSize(mapWidth, mapHeight);
  if (cell !== lastCellSize) {
    canvas.width = mapWidth * cell;
    canvas.height = mapHeight * cell;
    lastCellSize = cell;
  }
  const w = canvas.width;
  const h = canvas.height;

  // Background
  ctx.fillStyle = '#0d0700';
  ctx.fillRect(0, 0, w, h);

  // Determine if room is accessible (for glow)
  const roomAccessible = state.objectiveMode === 'room' ||
    (state.objectiveMode === 'collect' && state.wandCollected >= state.wandTotal);
  const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 400);

  // Draw cells
  const tunnelH = new Set(state.mapTunnels.horizontal);
  const tunnelV = new Set(state.mapTunnels.vertical);
  const door = state.mapRoomDoor;

  for (let r = 0; r < mapHeight; r++) {
    for (let c = 0; c < mapWidth; c++) {
      const cv = mapCells[r][c];
      const x = c * cell;
      const y = r * cell;

      // Tunnel opening cells on the border: draw with a distinct purple tint
      const isBorderCell = (r === 0 || r === mapHeight - 1 || c === 0 || c === mapWidth - 1);
      const isTunnelCell = isBorderCell &&
        ((tunnelH.has(r) && (c === 0 || c === mapWidth - 1)) ||
         (tunnelV.has(c) && (r === 0 || r === mapHeight - 1)));

      if (cv === 1 && !isTunnelCell) {
        ctx.fillStyle = '#3d2200';
        ctx.fillRect(x, y, cell, cell);
        ctx.strokeStyle = '#5a3510';
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 0.5, y + 0.5, cell - 1, cell - 1);
      } else if (cv === 2) {
        // Room cell — pulse green glow when accessible
        const gIntensity = roomAccessible ? Math.floor(30 + pulse * 40) : 30;
        ctx.fillStyle = `rgb(10,${gIntensity + 30},10)`;
        ctx.fillRect(x, y, cell, cell);
        const borderAlpha = roomAccessible ? (0.5 + pulse * 0.5).toFixed(2) : '0.4';
        ctx.strokeStyle = `rgba(60,200,60,${borderAlpha})`;
        ctx.lineWidth = roomAccessible ? 2 : 1;
        ctx.strokeRect(x + 0.5, y + 0.5, cell - 1, cell - 1);
      } else if (isTunnelCell) {
        // Tunnel exit: purple corridor
        const tp = 0.4 + 0.6 * Math.sin(Date.now() / 600);
        ctx.fillStyle = `rgba(80,20,120,${0.6 + tp * 0.3})`;
        ctx.fillRect(x, y, cell, cell);
        ctx.strokeStyle = `rgba(180,80,255,${0.6 + tp * 0.4})`;
        ctx.lineWidth = 2;
        ctx.strokeRect(x + 1, y + 1, cell - 2, cell - 2);
        // Draw directional arrow
        const isLeft = c === 0;
        const isRight = c === mapWidth - 1;
        const isTop = r === 0;
        const isBot = r === mapHeight - 1;
        ctx.fillStyle = `rgba(220,120,255,${0.7 + tp * 0.3})`;
        ctx.font = `bold ${Math.max(8, Math.round(cell * 0.55))}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const arrow = isLeft ? '←' : isRight ? '→' : isTop ? '↑' : '↓';
        ctx.fillText(arrow, x + cell / 2, y + cell / 2);
      }
      // type 0/3/4 = corridor (dark bg), nothing drawn
    }
  }

  // Door cell: draw a gate/arch indicator
  if (door) {
    const dx = door.c * cell;
    const dy = door.r * cell;
    const tp = 0.5 + 0.5 * Math.sin(Date.now() / 500);
    const doorAlpha = roomAccessible ? (0.6 + tp * 0.4).toFixed(2) : '0.5';
    ctx.fillStyle = `rgba(60,180,60,${doorAlpha})`;
    ctx.fillRect(dx + cell * 0.1, dy + cell * 0.6, cell * 0.8, cell * 0.35);
    // Arch
    ctx.beginPath();
    ctx.arc(dx + cell / 2, dy + cell * 0.6, cell * 0.4, Math.PI, 0);
    ctx.fillStyle = `rgba(30,120,30,${doorAlpha})`;
    ctx.fill();
    ctx.strokeStyle = `rgba(100,255,100,${doorAlpha})`;
    ctx.lineWidth = Math.max(1, cell * 0.08);
    ctx.stroke();
  }

  // Draw wands
  for (const wand of state.wands) {
    if (!wand.collected) {
      const x = wand.c * cell + cell / 2;
      const y = wand.r * cell + cell / 2;
      const glow = 0.4 + 0.6 * Math.sin(Date.now() / 300 + wand.c);
      ctx.shadowColor = '#ffaa00';
      ctx.shadowBlur = cell * 0.4 * glow;
      ctx.fillStyle = '#ffdd44';
      ctx.beginPath();
      ctx.arc(x, y, cell * 0.18, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  // Draw pursuers
  for (const p of pursuers) {
    const x = p.c * cell + cell / 2;
    const y = p.r * cell + cell / 2;
    const color = pursuerColors[p.type] || '#ff4444';
    const r = cell * 0.38;

    // Shadow
    ctx.shadowColor = color;
    ctx.shadowBlur = cell * 0.3;

    // Body
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y - cell * 0.04, r, Math.PI, 0);
    // Wavy bottom (ghost skirt)
    const waves = 3;
    for (let i = 0; i < waves; i++) {
      const wx = x - r + (r * 2 / waves) * (i + 0.5);
      const dir = i % 2 === 0 ? 1 : -1;
      ctx.arc(wx, y + r * 0.6, r / waves, 0, Math.PI, dir === -1);
    }
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x - r * 0.32, y - r * 0.2, r * 0.26, 0, Math.PI * 2);
    ctx.arc(x + r * 0.32, y - r * 0.2, r * 0.26, 0, Math.PI * 2);
    ctx.fill();
    // Pupils
    const pdx = (dirDelta(p.dir) || { dc: 0 }).dc * r * 0.1;
    const pdy = (dirDelta(p.dir) || { dr: 0 }).dr * r * 0.1;
    ctx.fillStyle = '#2244cc';
    ctx.beginPath();
    ctx.arc(x - r * 0.32 + pdx, y - r * 0.2 + pdy, r * 0.13, 0, Math.PI * 2);
    ctx.arc(x + r * 0.32 + pdx, y - r * 0.2 + pdy, r * 0.13, 0, Math.PI * 2);
    ctx.fill();

    // Initial label (visible at larger cell sizes)
    if (cell >= 24) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.font = `bold ${Math.round(cell * 0.28)}px monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(pursuerInitials[p.type] || '?', x, y + r * 0.45);
    }
  }

  // Draw avatar (Pac-Man)
  const ax = avatar.c * cell + cell / 2;
  const ay = avatar.r * cell + cell / 2;
  const angle = dirAngles[avatar.dir] ?? 0;
  const mouthAngle = 0.28;

  ctx.shadowColor = '#ffe066';
  ctx.shadowBlur = cell * 0.4;
  ctx.fillStyle = '#ffe066';
  ctx.beginPath();
  ctx.arc(ax, ay, cell * 0.42, angle + mouthAngle, angle + Math.PI * 2 - mouthAngle);
  ctx.lineTo(ax, ay);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Eye
  const eyeAngle = angle - Math.PI / 4;
  ctx.fillStyle = '#1a0e00';
  ctx.beginPath();
  ctx.arc(
    ax + Math.cos(eyeAngle) * cell * 0.2,
    ay + Math.sin(eyeAngle) * cell * 0.2,
    cell * 0.07, 0, Math.PI * 2,
  );
  ctx.fill();

  // Queued direction indicator (small arrow)
  if (avatar.queuedDir) {
    const qAngle = dirAngles[avatar.queuedDir] ?? 0;
    const arrowDist = cell * 0.7;
    ctx.fillStyle = 'rgba(255,220,100,0.6)';
    ctx.font = `${Math.round(cell * 0.3)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const symbols = { right: '›', left: '‹', up: '›', down: '›' };
    // Just draw a small dot in the queued direction
    ctx.beginPath();
    ctx.arc(
      ax + Math.cos(qAngle) * arrowDist,
      ay + Math.sin(qAngle) * arrowDist,
      cell * 0.1, 0, Math.PI * 2,
    );
    ctx.fill();
  }

  updateOverlay(status);
}

// Helper exposed in render scope — reuse from engine logic mirror
function dirDelta(dir) {
  switch (dir) {
    case 'up': return { dr: -1, dc: 0 };
    case 'down': return { dr: 1, dc: 0 };
    case 'left': return { dr: 0, dc: -1 };
    case 'right': return { dr: 0, dc: 1 };
    default: return { dr: 0, dc: 0 };
  }
}

function updateOverlay(status) {
  const overlay = document.getElementById('overlay');
  const title = document.getElementById('overlay-title');
  const sub = document.getElementById('overlay-sub');
  if (status === 'lobby') {
    overlay.classList.add('visible');
    title.textContent = 'En attente…';
    sub.textContent = 'L\'animateur lancera la partie';
  } else if (status === 'paused') {
    overlay.classList.add('visible');
    title.textContent = 'Pause';
    sub.textContent = 'En attente de joueurs…';
  } else if (status === 'levelTransition') {
    overlay.classList.add('visible');
    title.textContent = 'Salle sur Demande !';
    sub.textContent = 'Niveau suivant…';
  } else if (status === 'gameover') {
    overlay.classList.add('visible');
    title.textContent = 'Game Over';
    sub.textContent = 'L\'animateur peut relancer';
  } else if (status === 'won') {
    overlay.classList.add('visible');
    title.textContent = 'L\'Armée de Dumbledore vaincra !';
    sub.textContent = '🎉 Victoire ! 🎉';
  } else {
    overlay.classList.remove('visible');
  }
}

function updateHUD(s) {
  // Lives
  const livesEl = document.getElementById('lives');
  livesEl.textContent = '❤'.repeat(s.lives) + '🖤'.repeat(Math.max(0, 3 - s.lives));

  // Level
  document.getElementById('level-display').textContent = `Étage ${s.level}`;

  // Wands
  const wandsEl = document.getElementById('wands-display');
  if (s.objectiveMode === 'collect' && s.wandTotal > 0) {
    wandsEl.style.display = '';
    wandsEl.textContent = `Baguettes ${s.wandCollected}/${s.wandTotal}`;
  } else {
    wandsEl.style.display = 'none';
  }

  // Players count
  const connected = s.players.filter(p => p.connected).length;
  document.getElementById('players-count').textContent = `${connected} sorcier${connected !== 1 ? 's' : ''} connecté${connected !== 1 ? 's' : ''}`;

  // Vote bars
  const tally = s.voteTally;
  const total = Math.max(1, tally.up + tally.down + tally.left + tally.right);
  ['up','down','left','right'].forEach(dir => {
    const pct = (tally[dir] / total * 100).toFixed(1);
    document.getElementById(`bar-${dir}`).style.width = pct + '%';
    document.getElementById(`cnt-${dir}`).textContent = tally[dir];
  });

  // Tours
  document.getElementById('tours-count').textContent = `${s.toursJoues} tour${s.toursJoues !== 1 ? 's' : ''} joué${s.toursJoues !== 1 ? 's' : ''}`;
}

function addChatLine(event) {
  const line = document.createElement('div');
  line.className = 'chat-line';
  if (event.type === 'input') {
    const dirSymbols = { up: '↑', down: '↓', left: '←', right: '→' };
    line.innerHTML = `<span class="pseudo">@${escHtml(event.pseudo)}</span> <span class="dir">${dirSymbols[event.dir] || ''}</span>`;
  } else if (event.type === 'join') {
    line.className += ' join';
    line.textContent = `→ @${event.pseudo} est arrivé`;
  } else if (event.type === 'leave') {
    line.className += ' leave';
    line.textContent = `← @${event.pseudo} est parti`;
  } else if (event.type === 'kick') {
    line.className += ' leave';
    line.textContent = `⛔ @${event.pseudo} exclu`;
  }
  chatLines.unshift(line);
  if (chatLines.length > CHAT_MAX) chatLines.pop();
  const chatEl = document.getElementById('chat-list');
  chatEl.innerHTML = '';
  chatLines.forEach(l => chatEl.appendChild(l));
}

function escHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

socket.on('state:update', (s) => {
  state = s;
  render();
  updateHUD(s);
});

socket.on('chat:event', (event) => {
  addChatLine(event);
});

// Re-render on window resize (recalculates cell size)
window.addEventListener('resize', () => { if (state) render(); });

// Render loop for smooth animation
function loop() {
  if (state) render();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
