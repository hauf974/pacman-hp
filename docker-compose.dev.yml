services:
  pacmage:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      ADMIN_SECRET: "${ADMIN_SECRET:-pacmage-admin}"
      PUBLIC_URL: "${PUBLIC_URL:-http://localhost:3000}"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./tsconfig.json:/app/tsconfig.json
    restart: unless-stopped
